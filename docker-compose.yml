services:
  agent-dev:
    image: doer-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - ${DOER_AGENT_WORKSPACE:-..}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --server
      - ${DOER_AGENT_SERVER:?DOER_AGENT_SERVER is required}
      - --user-id
      - ${DOER_AGENT_USER_ID:?DOER_AGENT_USER_ID is required}
      - --agent-secret
      - ${DOER_AGENT_SECRET:?DOER_AGENT_SECRET is required}
